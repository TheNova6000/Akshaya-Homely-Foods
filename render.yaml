services:
  - type: web
    name: orderbot-backend
    runtime: node
    plan: free
    buildCommand: "npm install --prefix backend && sed -i 's/provider = \"sqlite\"/provider = \"postgresql\"/' backend/prisma/schema.prisma && npx prisma generate --schema=backend/prisma/schema.prisma && npx prisma db push --schema=backend/prisma/schema.prisma --accept-data-loss"
    startCommand: npm start --prefix backend
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: orderbot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: orderbot-frontend
    runtime: static
    plan: free
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: orderbot-db
    plan: starter
